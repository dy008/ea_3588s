name: kernel 5.10.160 for EA_3588S(official)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:

env:
  TZ: America/New_York

jobs:
  kdevbuild:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # set_release: [ bullseye, bookworm, jammy, noble ]
        set_release: [ bullseye, bookworm, jammy, noble, focal, forky, oracular, plucky, resolute, trixie ]
        # bullseye   Debian  11	    Oldstable（旧稳定版）	2021年8月	安全支持将持续至 2026年6月（LTS）
        # bookworm   Debian  12	    Stable（当前稳定版）	2023年6月	当前官方推荐稳定版本
        # trixie     Debian  13	    Testing（测试版）	预计 2025 年中发布	当前处于开发冻结前阶段
        # forky      Debian  14	    Unstable（未来开发版）	尚未发布	在 sid 之后的下一个开发代号
        # focal      Ubuntu  20.04  LTS（长期支持）	2020年4月	标准支持已于 2025年4月结束；需 Ubuntu Pro 获取扩展安全维护（ESM）
        # jammy      Ubuntu  22.04  LTS	2022年4月	免费支持至 2027年4月（桌面/服务器）
        # noble      Ubuntu  24.04  LTS	2024年4月	最新 LTS，支持至 2029年4月
        # oracular   Ubuntu  24.10  普通版（非LTS）	2024年10月	支持至 2025年7月（仅9个月）
        # plucky     Ubuntu  25.04  普通版（计划）	预计 2025年4月	尚未发布，开发代号
        # resolute   Ubuntu  25.10  普通版（计划）	预计 2025年10月	未来版本，已公布代号
        set_desktop: [ mini, gnome, xfce ]
        exclude:
          - set_release: bullseye
            set_desktop: gnome
          - set_release: bullseye
            set_desktop: xfce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        id: basic_info
        run: |
          nproc
          uname -a
          cat /etc/*release
          free -h
          mount
          df -h
          cat /proc/cpuinfo
          cat /proc/meminfo

      - name: Run build in Ubuntu 22.04 container
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          ls -alh
          sudo docker run --rm \
            --privileged \
            --cap-add SYS_ADMIN \
            -v /dev:/dev \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e set_release=${{ matrix.set_release }} \
            -e set_desktop=${{ matrix.set_desktop }} \
            ubuntu:22.04 \
            bash -c "
              chmod +x /workspace/build/build-ea3588s-kernel5.10.160.sh ;
              /workspace/build/build-ea3588s-kernel5.10.160.sh
            "

      - name: List build output
        run: |
          ls -alh  ${{ github.workspace }}/release/*
          md5sum ${{ github.workspace }}/release/*

      - name: Upload Image to Release
        uses: ncipollo/release-action@main
        with:
          tag: EA_3588S-kernel-5.10.160-official
          artifacts: ${{ github.workspace }}/release/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### ea_3588s镜像说明

            1. 镜像命名规则
            以 **EA_3588S_k5.10.160_${RELEASE}_${DESKTOP}_update.rar** 为例

            - "${RELEASE}" 发行版，可选一下几种发行版
              - bullseye - Debian 11
              - bookworm - Debian 12
              - trixie   - Debian 13
              - forky    - Debian 14
              - focal    - Ubuntu 20.04 LTS
              - jammy    - Ubuntu 22.04 LTS
              - noble    - Ubuntu 24.04 LTS
              - oracular - Ubuntu 24.10
              - plucky   - Ubuntu 25.04
              - resolute - Ubuntu 25.10
            - "${DESKTOP}" 桌面环境，可选 (mini,xfce,gnome)
            - 镜像类型，有两种类型
              - rockdev: RKDevTool + 分区镜像（uboot.img、boot.img、rootfs.img）
              - update : RKdevTool + update.img

            2. 系统密码

            - 用户名: root   密码: 1234
            - 用户名: admin  密码: admin
            - 用户名: teamhd 密码: teamhd
            - 用户名: linaro 密码: linaro

            3. rockdev构建输出(rockdev.rar)

            解压后打开RKDevTool.exe，选择'下载镜像'，点击'执行'即可

            ```
            RKDevTool/
            ├── bin
            │         ├── adb.exe
            │         ├── AdbWinApi.dll
            │         ├── AdbWinUsbApi.dll
            │         ├── AFPTool.exe
            │         └── RKImageMaker.exe
            ├── config.cfg
            ├── config.ini
            ├── Language
            │         ├── Chinese.ini
            │         └── English.ini
            ├── RKDevTool.exe
            └── rockdev
                └── image
                    ├── boot.img
                    ├── MiniLoaderAll.bin
                    ├── modules.tar.gz
                    ├── package-file
                    ├── parameter.txt
                    ├── rootfs.img
                    └── uboot.img
            ```

            4. update镜像构建输出(update.rar)

            解压后打开RKDevTool.exe，选择'升级固件'，点击'固件'，勾选镜像文件rockdev/img/update.img，点击'升级'即可

            ```
            RKDevTool/
            ├── bin
            │         ├── adb.exe
            │         ├── AdbWinApi.dll
            │         ├── AdbWinUsbApi.dll
            │         ├── AFPTool.exe
            │         └── RKImageMaker.exe
            ├── config.cfg
            ├── config.ini
            ├── Language
            │         ├── Chinese.ini
            │         └── English.ini
            ├── RKDevTool.exe
            └── rockdev
                └── image
                    └── update.img
            ```
